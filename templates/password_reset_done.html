{% extends 'base.html' %}
{% block content %}

<style>

/* 🔥 Software / Tech Background */
body {
    background: linear-gradient(rgba(12,18,35,0.9), rgba(12,18,35,0.9)),
                url('https://images.unsplash.com/photo-1519389950473-47ba0277781c');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Center Wrapper */
.success-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔥 Glass Card */
.success-card {
    max-width: 520px;
    width: 100%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 30px 70px rgba(0,0,0,0.7);
    padding: 50px;
    text-align: center;
    transition: 0.4s ease;
    color: white;
}

.success-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 40px 90px rgba(0,0,0,0.85);
}

/* Success Icon */
.icon-circle {
    width: 95px;
    height: 95px;
    border-radius: 50%;
    background: linear-gradient(135deg,#00e676,#00c853);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    color: white;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,230,118,0.5);
}

/* Title */
.success-card h3 {
    font-weight: 700;
    letter-spacing: 1px;
}

/* Description */
.success-card p {
    color: rgba(255,255,255,0.75) !important;
}

/* Button */
.btn-primary {
    background: linear-gradient(135deg,#4da3ff,#1e88e5);
    border: none;
    border-radius: 30px;
    padding: 10px 30px;
    font-weight: 600;
    transition: 0.3s ease;
}

.btn-primary:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(30,136,229,0.5);
}

</style>

<div class="success-wrapper">

    <div class="success-card">

        <div class="icon-circle">
            ✓
        </div>

        <h3 class="mt-4 fw-bold text-success">
            Reset Link Sent!
        </h3>

        <p class="mt-3">
            A password reset link has been sent to your registered email address.
            Please check your inbox (and spam folder).
        </p>

        <div class="mt-4">
            <a href="{% url 'login' %}" class="btn btn-primary px-4">
                Back to Login
            </a>
        </div>

    </div>

</div>

{% endblock %}
