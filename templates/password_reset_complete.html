{% extends 'base.html' %}
{% block content %}

<style>

/* 🔥 Modern Software Background (Different Image) */
body {
    background: linear-gradient(rgba(8,12,25,0.92), rgba(8,12,25,0.92)),
                url('https://images.unsplash.com/photo-1517433456452-f9633a875f6f');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Center Wrapper */
.complete-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔥 Glass Card */
.complete-card {
    max-width: 520px;
    width: 100%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 30px 70px rgba(0,0,0,0.75);
    padding: 55px;
    text-align: center;
    transition: 0.4s ease;
    color: white;
}

.complete-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 40px 95px rgba(0,0,0,0.9);
}

/* Success Icon */
.success-icon {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg,#00e676,#00c853);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    color: white;
    margin: auto;
    box-shadow: 0 15px 35px rgba(0,230,118,0.5);
}

/* Title */
.complete-card h3 {
    font-weight: 700;
    letter-spacing: 1px;
}

/* Description */
.complete-card p {
    color: rgba(255,255,255,0.75) !important;
}

/* Button */
.btn-modern {
    border-radius: 30px;
    padding: 12px 30px;
    font-weight: 600;
}

.btn-primary {
    background: linear-gradient(135deg,#4da3ff,#1e88e5);
    border: none;
    transition: 0.3s ease;
}

.btn-primary:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(30,136,229,0.5);
}

</style>

<div class="complete-wrapper">

    <div class="complete-card">

        <div class="success-icon">
            ✓
        </div>

        <h3 class="mt-4 fw-bold text-success">
            Password Successfully Reset!
        </h3>

        <p class="mt-3">
            Your password has been updated successfully.  
            You can now login using your new password.
        </p>

        <div class="mt-4">
            <a href="{% url 'login' %}"
               class="btn btn-primary btn-modern">
               Go to Login
            </a>
        </div>

    </div>

</div>

{% endblock %}
