{% extends 'base.html' %}
{% block content %}

<style>

/* 🔥 Focus Mode Premium Background */
body {
    background: linear-gradient(rgba(12,18,35,0.92), rgba(12,18,35,0.92)),
                url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Page spacing */
.container {
    min-height: 90vh;
}

/* 🔥 Glass Cards */
.card {
    background: rgba(255,255,255,0.08) !important;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 25px !important;
    border: 1px solid rgba(255,255,255,0.25) !important;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    color: white !important;
}

/* Exam Title */
h3 {
    color: #ffffff;
    letter-spacing: 1px;
}

/* Duration */
.text-muted {
    color: rgba(255,255,255,0.75) !important;
}

/* 🔥 Timer Badge */
.badge.bg-danger {
    background: linear-gradient(135deg,#ff4d4d,#b30000) !important;
    border-radius: 30px;
    font-weight: 600;
    padding: 8px 18px;
    box-shadow: 0 8px 20px rgba(255,77,77,0.4);
}

/* Question title */
.card-body h5 {
    font-size: 18px;
    font-weight: 600;
}

/* 🔥 Options */
.list-group-item {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 12px !important;
    margin-bottom: 10px;
    transition: 0.3s ease;
    cursor: pointer;
}

.list-group-item:hover {
    background: rgba(77,163,255,0.15) !important;
    transform: translateX(6px);
}

/* Radio buttons */
.form-check-input {
    cursor: pointer;
}

/* Submit Button */
.btn-success {
    background: linear-gradient(135deg,#00e676,#00c853);
    border: none;
    border-radius: 30px;
    font-weight: 600;
    transition: 0.3s ease;
}

.btn-success:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(0,230,118,0.5);
}

</style>


<div class="container mt-5 mb-5">

    <!-- Exam Header -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h3 class="fw-bold mb-1">{{ exam.title }}</h3>
                <small class="text-muted">
                    Duration: {{ exam.duration }} mins
                </small>
            </div>

            <div class="badge bg-danger fs-6 px-3 py-2">
                ⏳ Time Running
            </div>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}

        {% for question in questions %}
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">

                <h5 class="fw-semibold mb-3">
                    Q{{ forloop.counter }}.
                    {{ question.question_text }}
                </h5>

                <div class="list-group">

                    <label class="list-group-item">
                        <input type="radio"
                               name="question_{{ question.id }}"
                               value="A"
                               class="form-check-input me-2">
                        {{ question.option_a }}
                    </label>

                    <label class="list-group-item">
                        <input type="radio"
                               name="question_{{ question.id }}"
                               value="B"
                               class="form-check-input me-2">
                        {{ question.option_b }}
                    </label>

                    <label class="list-group-item">
                        <input type="radio"
                               name="question_{{ question.id }}"
                               value="C"
                               class="form-check-input me-2">
                        {{ question.option_c }}
                    </label>

                    <label class="list-group-item">
                        <input type="radio"
                               name="question_{{ question.id }}"
                               value="D"
                               class="form-check-input me-2">
                        {{ question.option_d }}
                    </label>

                </div>

            </div>
        </div>
        {% endfor %}

        <div class="text-center mt-4">
            <button type="submit"
                    class="btn btn-success px-5 py-2 fw-semibold shadow-sm">
                Submit Exam
            </button>
        </div>

    </form>

</div>

{% endblock %}
