{% extends 'base.html' %}
{% block content %}

<style>

/* 🔥 NEW Premium Background (Different Image) */
body {
    background: linear-gradient(rgba(20,25,45,0.92), rgba(20,25,45,0.92)),
                url('https://images.unsplash.com/photo-1518770660439-4636190af475');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Center Wrapper */
.reset-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔥 Glass Card */
.reset-card {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 30px 70px rgba(0,0,0,0.7);
    padding: 50px;
    transition: 0.4s ease;
    color: white;
}

.reset-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 40px 90px rgba(0,0,0,0.85);
}

/* Title */
.reset-title {
    font-weight: 700;
    margin-bottom: 15px;
    letter-spacing: 1px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

/* Description */
.reset-description {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 30px;
}

/* Form spacing */
.reset-card p {
    margin-bottom: 18px;
}

/* Input */
.reset-card input {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    transition: 0.3s ease;
}

.reset-card input:focus {
    border-color: #ffc107;
    box-shadow: 0 0 15px rgba(255,193,7,0.5);
}

/* Button */
.btn-modern {
    border-radius: 30px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s ease;
}

.btn-warning {
    background: linear-gradient(135deg,#ffca28,#ff8f00);
    border: none;
    color: black;
}

.btn-warning:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(255,193,7,0.5);
}

/* Login link */
.reset-card a {
    color: #4da3ff;
    text-decoration: none;
    font-weight: 500;
}

.reset-card a:hover {
    text-decoration: underline;
}

</style>

<div class="reset-wrapper">

    <div class="reset-card text-center">

        <h3 class="reset-title">🔑 Reset Password</h3>

        <p class="reset-description">
            Enter your registered email address and we’ll send you a password reset link.
        </p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="d-grid mt-3">
                <button type="submit"
                        class="btn btn-warning btn-modern">
                    Send Reset Link
                </button>
            </div>
        </form>

        <div class="mt-4">
            <small>
                Remember your password?
                <a href="{% url 'login' %}">Back to Login</a>
            </small>
        </div>

    </div>

</div>

{% endblock %}
