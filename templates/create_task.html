<!DOCTYPE html>
<html>
<head>
    <title>Create Task</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );
            padding:30px;
        }

        .container{
            width:100%;
            max-width:800px;
        }

        .glass-card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:25px;
            padding:40px;
            box-shadow:0 10px 35px rgba(0,0,0,0.4);
        }

        .title{
            text-align:center;
            color:#fff;
            font-size:38px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:35px;
        }

        label{
            display:block;
            color:white;
            font-weight:600;
            margin-bottom:8px;
        }

        .form-group{
            margin-bottom:20px;
        }

        input,
        textarea{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,0.10);
            color:white;
            font-size:15px;
            border:1px solid rgba(255,255,255,0.15);
        }

        textarea{
            min-height:150px;
            resize:none;
        }

        input:focus,
        textarea:focus{
            border:1px solid #38bdf8;
        }

        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            color:white;
            cursor:pointer;
            background:linear-gradient(
                135deg,
                #06b6d4,
                #2563eb
            );
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(37,99,235,.5);
        }

    </style>
</head>

<body>

<div class="container">

    <div class="glass-card">

        <h1 class="title">Create Task</h1>

        <p class="subtitle">
            Create assignments, projects and coding challenges
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Task Title</label>
                {{ form.title }}
            </div>

            <div class="form-group">
                <label>Description</label>
                {{ form.description }}
            </div>

            <div class="form-group">
                <label>Marks</label>
                {{ form.marks }}
            </div>

            <div class="form-group">
                <label>Deadline</label>
                {{ form.deadline }}
            </div>

            <button type="submit" class="btn">
                Create Task
            </button>

        </form>

    </div>

</div>

</body>
</html>
