{% extends 'base.html' %}
{% block content %}

<style>
.admin-wrapper {
    min-height: 80vh;
    padding-top: 40px;
}

.admin-card {
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    transition: 0.3s ease;
}

.admin-card:hover {
    transform: translateY(-5px);
}

.stat-box {
    border-radius: 15px;
    padding: 25px;
    color: white;
}

.bg-gradient-blue {
    background: linear-gradient(135deg,#4e73df,#224abe);
}

.bg-gradient-green {
    background: linear-gradient(135deg,#1cc88a,#13855c);
}

.bg-gradient-orange {
    background: linear-gradient(135deg,#f6c23e,#dda20a);
}
</style>

<div class="container admin-wrapper">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">🛠 Admin Dashboard</h2>
        <a href="{% url 'logout' %}" class="btn btn-danger">
            Logout
        </a>
    </div>

    <div class="row g-4">

        <!-- Example Stat Card 1 -->
        <div class="col-md-4">
            <div class="card admin-card border-0">
                <div class="stat-box bg-gradient-blue text-center">
                    <h5>Total Users</h5>
                    <h3>--</h3>
                </div>
            </div>
        </div>

        <!-- Example Stat Card 2 -->
        <div class="col-md-4">
            <div class="card admin-card border-0">
                <div class="stat-box bg-gradient-green text-center">
                    <h5>Total Exams</h5>
                    <h3>--</h3>
                </div>
            </div>
        </div>

        <!-- Example Stat Card 3 -->
        <div class="col-md-4">
            <div class="card admin-card border-0">
                <div class="stat-box bg-gradient-orange text-center">
                    <h5>Total Results</h5>
                    <h3>--</h3>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
