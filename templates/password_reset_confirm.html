{% extends 'base.html' %}
{% block content %}

<style>

/* 🔥 Software / Security Background (Different Image) */
body {
    background: linear-gradient(rgba(10,15,30,0.92), rgba(10,15,30,0.92)),
                url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Center Wrapper */
.newpass-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔥 Glass Card */
.newpass-card {
    width: 100%;
    max-width: 500px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow: 0 30px 70px rgba(0,0,0,0.75);
    padding: 50px;
    transition: 0.4s ease;
    color: white;
}

.newpass-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 40px 90px rgba(0,0,0,0.9);
}

/* Title */
.newpass-title {
    font-weight: 700;
    margin-bottom: 15px;
    letter-spacing: 1px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

/* Description */
.newpass-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 30px;
}

/* Form spacing */
.newpass-card p {
    margin-bottom: 18px;
}

/* Input Styling */
.newpass-card input {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    transition: 0.3s ease;
}

.newpass-card input:focus {
    border-color: #00e676;
    box-shadow: 0 0 15px rgba(0,230,118,0.5);
}

/* Button */
.btn-modern {
    border-radius: 30px;
    padding: 12px;
    font-weight: 600;
    transition: 0.3s ease;
}

.btn-success {
    background: linear-gradient(135deg,#00e676,#00c853);
    border: none;
}

.btn-success:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(0,230,118,0.5);
}

</style>

<div class="newpass-wrapper">

    <div class="newpass-card text-center">

        <h3 class="newpass-title">🔒 Set New Password</h3>

        <p class="newpass-desc">
            Enter your new password below. Make sure it is strong and secure.
        </p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="d-grid mt-3">
                <button type="submit"
                        class="btn btn-success btn-modern">
                    Reset Password
                </button>
            </div>
        </form>

    </div>

</div>

{% endblock %}
