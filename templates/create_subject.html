{% extends 'base.html' %}

{% block content %}

<style>
    body {
        background: linear-gradient(rgba(15,20,40,0.85), rgba(15,20,40,0.85)),
        url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1920");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: 'Segoe UI', sans-serif;
        color: #ffffff;
    }

    h2 {
        text-align: center;
        font-weight: 700;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    form {
        width: 400px;
        margin: auto;
        padding: 40px;
        border-radius: 20px;
        background: rgba(12,122,205,0.15);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 10px 35px rgba(0,0,0,0.5);
        animation: fadeUp 0.6s ease;
    }

    input[type="text"] {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        outline: none;
        font-size: 14px;
        background: rgba(255,255,255,0.15);
        color: #ffffff;
        margin-bottom: 20px;
        transition: 0.3s ease;
    }

    input[type="text"]::placeholder {
        color: rgba(255,255,255,0.7);
    }

    input[type="text"]:focus {
        background: rgba(255,255,255,0.25);
        transform: scale(1.03);
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 30px;
        border: none;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        background: linear-gradient(135deg,#4e73df,#224abe);
        color: #ffffff;
        transition: 0.3s ease;
        box-shadow: 0 5px 20px rgba(78,115,223,0.6);
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(78,115,223,0.8);
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(25px); }
        to { opacity: 1; transform: translateY(0); }
    }


/* ================= MOBILE RESPONSIVE FIX ================= */
@media (max-width: 768px) {

    /* Fix fixed background glitch */
    body {
        background-attachment: scroll;
    }

    /* Reduce heading size */
    h2 {
        font-size: 20px;
        margin-bottom: 20px;
        padding: 0 10px;
    }

    /* Make form responsive */
    form {
        width: 90%;
        padding: 25px;
        border-radius: 16px;
    }

    /* Input adjustments */
    input[type="text"] {
        font-size: 13px;
        padding: 10px;
    }

    /* Button adjustments */
    button {
        font-size: 14px;
        padding: 10px;
    }

    /* Remove hover lift on mobile */
    button:hover {
        transform: none;
    }

}
</style>


<h2>Create Subject</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Subject Name">
    <button type="submit">Create</button>
</form>

{% endblock %}
