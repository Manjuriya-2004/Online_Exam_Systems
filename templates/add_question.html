<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <style>
body {
    margin: 0;
    padding: 0;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=1920");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


        .form-container {
            width: 450px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(12, 122, 205, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: hsl(0, 22%, 95%);
            animation: fadeIn 0.8s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        form p {
            margin-bottom: 15px;
        }

        form input,
        form select,
        form textarea {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: hsl(240, 3%, 6%);
            font-size: 14px;
            transition: 0.3s ease;
        }

        form input::placeholder,
        form textarea::placeholder {
            color: #eee;
        }

        form input:focus,
        form select:focus,
        form textarea:focus {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.02);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: white;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Add Question</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Question</button>
        </form>
    </div>

</body>
</html>
